name: CI/CD with CodeDeploy

on:
  pull_request:
    types: [closed]
    branches:
      - develop # PR이 develop에 머지될 때만 실행
  workflow_dispatch: # 수동 실행 가능

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Grant execute permission for deploy scripts
        run: chmod +x scripts/*.sh

      - name: Build project
        run: ./gradlew clean build -x test

      - name: Prepare deploy package
        run: |
          mkdir -p before-deploy/scripts
          cp scripts/*.sh before-deploy/scripts/
          cp appspec.yml before-deploy/
          cp build/libs/*.jar before-deploy/
          cd before-deploy && zip -r cotato-11th-weather.zip *
          mkdir -p ../deploy
          mv cotato-11th-weather.zip ../deploy/

      - name: Upload to S3
        uses: jakejarvis/s3-sync-action@master
        with:
          args: --acl private --follow-symlinks --delete
        env:
          AWS_S3_BUCKET: ${{ secrets.AWS_S3_BUCKET }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ap-northeast-2
          SOURCE_DIR: deploy

      - name: Deploy to AWS CodeDeploy using AWS CLI
        run: |
          aws deploy create-deployment \
            --application-name ${{ secrets.CODEDEPLOY_APP_NAME }} \
            --deployment-group-name ${{ secrets.CODEDEPLOY_DEPLOY_GROUP }} \
            --deployment-config-name CodeDeployDefault.AllAtOnce \
            --description "Deploy from GitHub Actions via AWS CLI" \
            --s3-location bucket=${{ secrets.AWS_S3_BUCKET }},bundleType=zip,key=cotato-11th-weather.zip \
            --region ap-northeast-2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}