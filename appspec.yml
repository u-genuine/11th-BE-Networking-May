version: 0.0
os: linux
files:
  - source: .
    destination: /home/ec2-user/app/step2/zip/
    overwrite: yes

permissions:
  - object: /home/ec2-user/app/step2/zip
    pattern: "**"
    owner: ec2-user
    group: ec2-user

hooks:
  BeforeInstall:
    - location: scripts/cleanup.sh
      timeout: 60
      runas: ec2-user
    - location: deploy.sh
      timeout: 60
      runas: ec2-user